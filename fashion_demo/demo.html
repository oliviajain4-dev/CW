<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 옷장의 코디 — Fashion Show</title>
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Georgia',serif; }

    #loading {
      position:fixed; inset:0; background:#06060f;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:999; color:rgba(255,255,255,0.55);
      font-size:11px; letter-spacing:5px; text-transform:uppercase;
      transition:opacity 1.0s;
    }
    .bar-wrap { width:200px; height:1px; background:rgba(255,255,255,0.15); margin-top:22px; }
    #bar      { height:1px; width:0; background:#fff; transition:width 0.3s; }

    #overlay  { position:fixed; inset:0; pointer-events:none; z-index:10; display:none; }

    /* 코너 데코 */
    .c { position:absolute; width:26px; height:26px; border:1px solid rgba(255,255,255,0.2); }
    .c.tl { top:14px;    left:14px;   border-right:none; border-bottom:none; }
    .c.tr { top:14px;    right:14px;  border-left:none;  border-bottom:none; }
    .c.bl { bottom:14px; left:14px;   border-right:none; border-top:none; }
    .c.br { bottom:14px; right:14px;  border-left:none;  border-top:none; }

    /* 브랜드 */
    #brand { position:absolute; top:22px; left:50%; transform:translateX(-50%); text-align:center; color:#fff; }
    #brand .sub  { font-size:9px; letter-spacing:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; }
    #brand .main { font-size:19px; letter-spacing:5px; font-weight:400; margin-top:5px; }

    /* 날씨 */
    #weather { position:absolute; top:22px; right:26px; text-align:right; color:rgba(255,255,255,0.82); }
    #weather .temp { font-size:34px; font-weight:200; line-height:1; }
    #weather .loc  { font-size:10px; letter-spacing:3px; margin-top:4px; opacity:0.5; }

    /* 오늘의 코디 카드 */
    #outfit {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.58); border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(16px);
      padding:14px 34px; text-align:center; color:#fff;
      min-width:400px; white-space:nowrap;
    }
    #outfit .tag {
      font-size:8px; letter-spacing:5px; color:rgba(255,255,255,0.36);
      text-transform:uppercase; margin-bottom:8px;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    #outfit .tag::before, #outfit .tag::after
      { content:''; flex:1; height:1px; background:rgba(255,255,255,0.16); }
    #outfit .name   { font-size:14px; letter-spacing:2px; margin-bottom:5px; }
    #outfit .detail { font-size:10px; color:rgba(255,255,255,0.44); letter-spacing:1px; }

    /* 카메라 앵글 표시 */
    #cam-label {
      position:absolute; top:22px; left:26px;
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.28);
    }

    /* 드래그 힌트 */
    #hint {
      position:absolute; bottom:92px; right:20px;
      color:rgba(255,255,255,0.2); font-size:9px;
      letter-spacing:3px; writing-mode:vertical-rl; text-transform:uppercase;
    }
  </style>
</head>
<body>

<div id="loading">
  <span>Loading Fashion Show</span>
  <div class="bar-wrap"><div id="bar"></div></div>
</div>

<div id="overlay">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>

  <div id="cam-label">● Live</div>

  <div id="brand">
    <div class="sub">내 옷장의 코디</div>
    <div class="main">Today's Recommendation</div>
  </div>

  <div id="weather">
    <div class="temp">18°C</div>
    <div class="loc">맑음 · 서울</div>
    <div class="loc" style="margin-top:2px;font-size:9px">2026.04.10</div>
  </div>

  <div id="outfit">
    <div class="tag">Today's Outfit</div>
    <div class="name">화이트 린넨 블라우스 &nbsp;+&nbsp; 네이비 미디 스커트</div>
    <div class="detail">블랙 스틸레토 힐 &nbsp;·&nbsp; 베이지 숄더백 &nbsp;·&nbsp; 골드 이어링</div>
  </div>

  <div id="hint">Drag · Rotate</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

const bar = document.getElementById('bar');

/* ══════════════════════════════════════════════════════════
   RENDERER
══════════════════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled  = true;
renderer.shadowMap.type     = THREE.PCFSoftShadowMap;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

/* ══════════════════════════════════════════════════════════
   SCENE
══════════════════════════════════════════════════════════ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07071a);
scene.fog = new THREE.Fog(0x07071a, 20, 46);

/* ══════════════════════════════════════════════════════════
   CAMERA + ORBIT (수동 전용)
══════════════════════════════════════════════════════════ */
const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.05, 100);
camera.position.set(4, 1.5, 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.1, 0);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.minDistance    = 1.2;
controls.maxDistance    = 18;
controls.maxPolarAngle  = Math.PI * 0.56;
controls.update();

// 사용자 드래그 감지 → 자동 카메라 일시 정지
let manualCam      = false;
let manualTimer    = null;
controls.addEventListener('start', () => {
  manualCam = true;
  clearTimeout(manualTimer);
});
controls.addEventListener('end', () => {
  // 6초 후 자동 복귀
  manualTimer = setTimeout(() => { manualCam = false; }, 6000);
});

/* ══════════════════════════════════════════════════════════
   LIGHTING  — 옷 색상이 잘 보이도록 적절한 밝기
══════════════════════════════════════════════════════════ */
// 환경광 — 낮게 유지해야 의상 색이 보임
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// 키 라이트 (정면 좌상)
const kL = new THREE.DirectionalLight(0xfff8f0, 2.5);
kL.position.set(-2, 6, 4);
kL.castShadow = true;
kL.shadow.mapSize.set(2048, 2048);
kL.shadow.camera.near = 0.1; kL.shadow.camera.far = 30;
kL.shadow.camera.left = kL.shadow.camera.bottom = -5;
kL.shadow.camera.right = kL.shadow.camera.top   =  5;
kL.shadow.bias = -0.001;
scene.add(kL);

// 필 라이트 (우측)
const fL = new THREE.DirectionalLight(0xd8e8ff, 1.2);
fL.position.set(4, 4, 2);
scene.add(fL);

// 림 라이트 (후방 윤곽)
const rL = new THREE.DirectionalLight(0xffccaa, 1.8);
rL.position.set(0, 5, -5);
scene.add(rL);

// 천장 스포트라이트
const spot = new THREE.SpotLight(0xffffff, 5.0, 14, 0.35, 0.6, 1.4);
spot.position.set(0, 8, 0);
spot.castShadow = true;
spot.shadow.mapSize.set(1024, 1024);
spot.target.position.set(0, 0, 0);
scene.add(spot); scene.add(spot.target);

// 바닥 반사광
const bounce = new THREE.PointLight(0xfff0cc, 0.8, 5);
bounce.position.set(0, 0.1, 0);
scene.add(bounce);

/* ══════════════════════════════════════════════════════════
   OUTFIT MATERIALS  ─ 오늘의 의상 색상
   화이트 린넨 블라우스 + 네이비 미디 스커트 + 블랙 힐
══════════════════════════════════════════════════════════ */
// ── 오늘의 의상: 화이트 린넨 블라우스 + 네이비 미디 스커트 + 블랙 힐 ──
// emissive 제거 — 조명 아래서 자연스러운 색상으로 표현
const MAT = {
  skin   : new THREE.MeshStandardMaterial({ color:0xf0b490, roughness:0.70, metalness:0 }),
  hair   : new THREE.MeshStandardMaterial({ color:0x0e0606, roughness:0.90, metalness:0 }),
  blouse : new THREE.MeshStandardMaterial({ color:0xf0e6d8, roughness:0.92, metalness:0 }), // 크림 화이트
  skirt  : new THREE.MeshStandardMaterial({ color:0x1a2c52, roughness:0.85, metalness:0 }), // 네이비
  shoe   : new THREE.MeshStandardMaterial({ color:0x080808, roughness:0.16, metalness:0.92 }), // 블랙
};

function applyOutfit(model) {
  const bb = new THREE.Box3().setFromObject(model);
  const h  = bb.max.y - bb.min.y;

  model.traverse(child => {
    if (!child.isMesh) return;
    child.castShadow    = true;
    child.receiveShadow = true;

    const cbb = new THREE.Box3().setFromObject(child);
    const cy  = (cbb.min.y + cbb.max.y) / 2;
    const r   = (cy - bb.min.y) / h;   // 0=발 ~ 1=정수리

    if      (r > 0.88) child.material = MAT.hair;
    else if (r > 0.72) child.material = MAT.skin;
    else if (r > 0.40) child.material = MAT.blouse;   // 상체 → 화이트 블라우스
    else if (r > 0.06) child.material = MAT.skirt;    // 하체 → 네이비 스커트
    else               child.material = MAT.shoe;     // 발   → 블랙 힐
  });
}

/* ══════════════════════════════════════════════════════════
   ENVIRONMENT — 런웨이 무대
══════════════════════════════════════════════════════════ */
// 광택 바닥
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 40),
  new THREE.MeshStandardMaterial({ color:0x0d0d1e, roughness:0.04, metalness:0.90 })
);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
scene.add(floor);

// 런웨이 카펫
const carpet = new THREE.Mesh(
  new THREE.PlaneGeometry(2.2, 32),
  new THREE.MeshStandardMaterial({ color:0x141428, roughness:0.50, metalness:0.12 })
);
carpet.rotation.x = -Math.PI/2; carpet.position.y = 0.001;
carpet.receiveShadow = true;
scene.add(carpet);

// LED 엣지
const ledMat = new THREE.MeshStandardMaterial({
  color:0xffffff, emissive:new THREE.Color(0xffffff), emissiveIntensity:3.2, roughness:1
});
for (const x of [-1.12, 1.12]) {
  const led = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.02, 28), ledMat);
  led.position.set(x, 0.012, 0);
  scene.add(led);
}

// 뒷벽
const bwall = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 11),
  new THREE.MeshStandardMaterial({ color:0x070718, roughness:0.95 })
);
bwall.position.set(0, 5.5, -15);
scene.add(bwall);

// 관객 봉/기둥 제거 — 깔끔한 런웨이만 표시
const flashes = [];

/* ══════════════════════════════════════════════════════════
   LOAD CHARACTER
   1) URL ?model=xxx.glb  (Mixamo 파일)
   2) Three.js Michelle (여성 캐릭터)
   3) Three.js Soldier (폴백)
══════════════════════════════════════════════════════════ */
const urlModel = new URLSearchParams(location.search).get('model');
// Soldier 먼저 — Walk 애니메이션 보유 확인됨
// Michelle은 SambaDance/TPose만 있어서 제외
const MODELS   = [
  urlModel,
  'https://threejs.org/examples/models/gltf/Soldier.glb',
].filter(Boolean);

let character = null;
let mixer     = null;

async function loadCharacter() {
  const loader = new GLTFLoader();
  for (const url of MODELS) {
    try {
      const gltf = await new Promise((res, rej) =>
        loader.load(url, res,
          xhr => { if (xhr.total) bar.style.width = (20 + xhr.loaded/xhr.total*72)+'%'; },
          rej)
      );
      character = gltf.scene;

      // 발 → y=0 정렬
      const bb = new THREE.Box3().setFromObject(character);
      character.position.y = -bb.min.y;

      // 의상 재질 적용
      applyOutfit(character);

      // 애니메이션 목록 확인 (디버그)
      console.log('[Fashion] animations:', gltf.animations.map(a => a.name));

      mixer = new THREE.AnimationMixer(character);

      // Walk 클립 우선순위: Walk → walk → Walking → 이름에 walk 포함 → 인덱스 1 → 인덱스 0
      const clip =
        THREE.AnimationClip.findByName(gltf.animations, 'Walk')     ||
        THREE.AnimationClip.findByName(gltf.animations, 'walk')     ||
        THREE.AnimationClip.findByName(gltf.animations, 'Walking')  ||
        THREE.AnimationClip.findByName(gltf.animations, 'walking')  ||
        gltf.animations.find(a => a.name.toLowerCase().includes('walk')) ||
        (gltf.animations.length > 1 ? gltf.animations[1] : gltf.animations[0]);

      console.log('[Fashion] selected clip:', clip?.name);

      if (clip) {
        const action = mixer.clipAction(clip);
        action.reset().play();
      }
      // 패션 워크: 느리게 (0.5)
      mixer.timeScale = 0.5;

      scene.add(character);
      return true;
    } catch(e) { console.warn('skip', url, e); }
  }
  return false;
}

/* ══════════════════════════════════════════════════════════
   WALK PATH  — 런웨이 왕복 (천천히)
══════════════════════════════════════════════════════════ */
function eio(t) { return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

function getPath(t) {
  const u = ((t%1)+1)%1;
  // 앞으로 걷기 40% → 정지+턴 8% → 뒤로 걷기 40% → 정지+턴 12%
  if (u < 0.40) return { z:-8 + u/0.40*14,          ry:0,                                    walking:true  };
  if (u < 0.48) return { z: 6,                       ry:eio((u-0.40)/0.08)*Math.PI,           walking:false };
  if (u < 0.88) return { z: 6-(u-0.48)/0.40*14,     ry:Math.PI,                              walking:true  };
                return { z:-8,                       ry:Math.PI+eio((u-0.88)/0.12)*Math.PI,  walking:false };
}

/* ══════════════════════════════════════════════════════════
   CAMERA — 3가지 앵글, 10초마다 천천히 전환
   캐릭터를 항상 화면 중앙에 두고 조용히 따라감
══════════════════════════════════════════════════════════ */
const SHOTS = [
  // 오른쪽 측면 전신 (기본)
  { cam:(cp)=>new THREE.Vector3(cp.x + 4.2, 1.5,  cp.z + 0.5), look:(cp)=>new THREE.Vector3(cp.x, 1.1, cp.z) },
  // 정면에서 걸어오는 방향
  { cam:(cp)=>new THREE.Vector3(cp.x + 0.3, 1.6,  cp.z + 5.5), look:(cp)=>new THREE.Vector3(cp.x, 1.2, cp.z) },
  // 사선 45° 전신
  { cam:(cp)=>new THREE.Vector3(cp.x + 3.5, 1.55, cp.z + 3.5), look:(cp)=>new THREE.Vector3(cp.x, 1.1, cp.z) },
];

const SHOT_DURATION = 10.0;  // 쇼트당 10초 (천천히)
const SHOT_BLEND    = 3.0;   // 전환 3초 (부드럽게)

let shotIdx   = 0;
let shotTimer = 0;

// 현재 카메라 위치 (lerp로 부드럽게)
const smoothCamPos = new THREE.Vector3(4.2, 1.5, 0.5);
const smoothCamTgt = new THREE.Vector3(0, 1.1, 0);

/* ══════════════════════════════════════════════════════════
   ANIMATE
══════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
let pathT   = 0.15;   // 화면 정면 근처에서 시작

bar.style.width = '20%';

loadCharacter().then(ok => {
  bar.style.width = '100%';
  setTimeout(() => {
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(() => {
      el.style.display  = 'none';
      document.getElementById('overlay').style.display = 'block';
    }, 800);
  }, 200);
  if (!ok) console.error('모든 모델 로드 실패 — python -m http.server 로 열어주세요');
});

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (mixer) mixer.update(dt);

  if (character) {
    // 걸음 (천천히 — 0.002)
    pathT += 0.002;
    const ps = getPath(pathT);
    character.position.z = ps.z;
    character.rotation.y = ps.ry;

    // Walk 속도 (멈출 때 감속, 걸을 때 0.55 — 패션 워크)
    const wsTarget = ps.walking ? 0.55 : 0.0;
    if (mixer) mixer.timeScale += (wsTarget - mixer.timeScale) * 0.08;

    const cp = character.position;

    // 조명 캐릭터 추적
    spot.target.position.set(cp.x, 0, cp.z);
    bounce.position.set(cp.x, 0.1, cp.z);

    // 관객 플래시
    for (const fl of flashes) {
      if (Math.random() < 0.004) {
        fl.intensity = 3 + Math.random()*4;
        setTimeout(() => { fl.intensity=0; }, 60+Math.random()*90);
      }
    }

    // ─ 자동 멀티앵글 카메라 ─
    if (!manualCam) {
      shotTimer += dt;

      // 쇼트 전환
      if (shotTimer > SHOT_DURATION) {
        shotTimer = 0;
        shotIdx   = (shotIdx + 1) % SHOTS.length;
      }

      const shot      = SHOTS[shotIdx];
      const targetPos = shot.cam(cp);
      const targetTgt = shot.look(cp);

      // 전환 시 살짝 빠르게, 이후 매우 천천히 추적 (어지럽지 않음)
      const blendSpeed = shotTimer < SHOT_BLEND
        ? THREE.MathUtils.mapLinear(shotTimer, 0, SHOT_BLEND, 0.04, 0.012)
        : 0.012;

      smoothCamPos.lerp(targetPos, blendSpeed);
      smoothCamTgt.lerp(targetTgt, blendSpeed * 1.5);

      camera.position.copy(smoothCamPos);
      camera.lookAt(smoothCamTgt);
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코디 음성 채팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 헤더 ── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 17px; font-weight: 600; color: #fff; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.connected  { background: #4caf50; }
    .status-dot.listening  { background: #4caf50; animation: pulse 1.2s infinite; }
    .status-dot.recording  { background: #f44336; animation: blink 0.8s infinite; }
    .status-dot.processing { background: #ff9800; }
    .status-dot.playing    { background: #2196f3; }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.25} }
    @keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5); opacity:0.6} }

    /* ── 채팅 영역 ── */
    #chat {
      width: 100%; max-width: 480px; flex: 1;
      overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .bubble.user {
      align-self: flex-end; background: #3a3a5c; color: #e8e8f0;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start; background: #1e1e2e; color: #c9d1e8;
      border-bottom-left-radius: 4px; border: 1px solid #2a2a40;
    }
    .bubble.error {
      align-self: center; background: #3b1a1a; color: #ff8a8a; font-size: 13px;
    }

    /* ── 상태 표시 텍스트 ── */
    #status-text {
      font-size: 13px; color: #888; text-align: center;
      min-height: 20px; transition: color 0.3s;
    }
    #status-text.active { color: #a0b0ff; }

    /* ── 오디오 레벨 바 ── */
    #level-bar {
      width: 220px; height: 4px; background: #222;
      border-radius: 2px; overflow: hidden;
    }
    #level-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4caf50, #8bc34a);
      border-radius: 2px; transition: width 0.05s;
    }

    /* ── 컨트롤 영역 ── */
    #controls {
      width: 100%; max-width: 480px;
      padding: 12px 24px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    /* ── 버튼 그룹 ── */
    .btn-row { display: flex; gap: 16px; align-items: center; }

    /* 대화 시작/종료 (메인 버튼) */
    #talk-btn {
      width: 80px; height: 80px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #4caf50, #00bcd4);
      color: white; font-size: 30px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(76,175,80,0.4);
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
      user-select: none;
    }
    #talk-btn:hover { transform: scale(1.06); }
    #talk-btn.active {
      background: linear-gradient(135deg, #f44336, #e91e63);
      box-shadow: 0 4px 28px rgba(244,67,54,0.5);
      animation: glow 2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 4px 28px rgba(244,67,54,0.5); }
      50%      { box-shadow: 0 4px 40px rgba(244,67,54,0.8); }
    }

    /* 화자 선택 */
    #speaker-select {
      background: #1e1e2e; border: 1px solid #2a2a40;
      color: #c9d1e8; padding: 4px 10px; border-radius: 8px;
      font-size: 12px; cursor: pointer;
    }

    /* 침묵 타이머 바 */
    #silence-bar-wrap {
      width: 220px; height: 3px; background: #1a1a2e;
      border-radius: 2px; overflow: hidden; opacity: 0;
      transition: opacity 0.3s;
    }
    #silence-bar-wrap.visible { opacity: 1; }
    #silence-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c4dff, #e040fb);
      border-radius: 2px; transition: width 0.1s linear;
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="status-dot"></div>
  <h1>코디 음성 채팅</h1>
  <select id="speaker-select" style="margin-left:auto" title="TTS 화자">
    <option value="ko-KR-Wavenet-A">여성 A</option>
    <option value="ko-KR-Wavenet-B">여성 B</option>
    <option value="ko-KR-Wavenet-C">남성 C</option>
    <option value="ko-KR-Wavenet-D">남성 D</option>
    <option value="ko-KR-Standard-A">여성 (일반)</option>
  </select>
</header>

<div id="chat">
  <div class="bubble assistant">안녕! 아래 버튼을 눌러서 코디 얘기 시작해봐.</div>
</div>

<div id="controls">
  <div id="level-bar"><div id="level-fill"></div></div>
  <div id="silence-bar-wrap"><div id="silence-fill"></div></div>

  <div class="btn-row">
    <button id="talk-btn" title="대화 시작 / 종료">🎙️</button>
  </div>

  <div id="status-text">버튼을 눌러 대화를 시작하세요</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// 설정값
// ═══════════════════════════════════════════════════════════════════
const WS_URL = `ws://${location.host}/voice/ws`;

// 인터럽트: 재생 중 이 볼륨 이상이면 사용자가 말하는 것
const INTERRUPT_RMS   = 0.045;
// 침묵 감지: 이 볼륨 이하면 "조용함"으로 판단
const SPEECH_RMS      = 0.018;
// 침묵이 이 시간(ms) 지속되면 자동 전송 (말이 끝난 것으로 판단)
const SILENCE_MS      = 1300;
// 최소 발화 길이(ms) — 이보다 짧으면 잡음으로 무시
const MIN_SPEECH_MS   = 400;
// AI 답변 후 자동 녹음 시작 딜레이(ms)
const AUTO_LISTEN_MS  = 400;

// ═══════════════════════════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════════════════════════
let ws            = null;
let mediaRecorder = null;
let audioChunks   = [];

// 모드 플래그
let isChatMode    = false;   // 대화 모드 켜짐/꺼짐
let isRecording   = false;
let isProcessing  = false;

// TTS 재생 큐
let audioQueue    = [];
let isPlaying     = false;
let currentAudio  = null;

// 마이크 / 오디오 분석
let audioCtx  = null;
let analyser  = null;
let micStream = null;

// VAD 타이머들
let vadTimer      = null;   // 인터럽트 감지 (재생 중)
let silenceTimer  = null;   // 침묵 감지 (녹음 중)
let speechStart   = null;   // 발화 시작 시각

// ═══════════════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════════════
const chatEl       = document.getElementById('chat');
const talkBtn      = document.getElementById('talk-btn');
const statusDot    = document.getElementById('status-dot');
const levelFill    = document.getElementById('level-fill');
const silenceFill  = document.getElementById('silence-fill');
const silenceWrap  = document.getElementById('silence-bar-wrap');
const statusText   = document.getElementById('status-text');
const speakerSel   = document.getElementById('speaker-select');

// ═══════════════════════════════════════════════════════════════════
// UI 상태 업데이트
// ═══════════════════════════════════════════════════════════════════
function setUI(state) {
  statusDot.className = `status-dot ${state}`;

  const labels = {
    disconnected: '연결 끊김 — 재연결 중...',
    connected:    '버튼을 눌러 대화를 시작하세요',
    listening:    '듣고 있어요... 말해주세요',
    recording:    '말하는 중... (침묵하면 자동 전송)',
    processing:   '처리 중...',
    playing:      'AI 답변 중 — 말하면 바로 끊을게',
  };
  statusText.textContent = labels[state] || '';
  statusText.className   = ['listening','recording','playing'].includes(state) ? 'active' : '';

  silenceWrap.classList.toggle('visible', state === 'recording');
  if (state !== 'recording') {
    silenceFill.style.width = '0%';
    silenceFill.style.transition = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════════
// 채팅 버블
// ═══════════════════════════════════════════════════════════════════
function addBubble(role, text) {
  const div = document.createElement('div');
  div.className   = `bubble ${role}`;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

// ═══════════════════════════════════════════════════════════════════
// TTS 재생 큐
// ═══════════════════════════════════════════════════════════════════
function enqueueAudio(b64) {
  audioQueue.push(b64);
  if (!isPlaying) playNext();
}

function playNext() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    stopInterruptVAD();

    if (isChatMode) {
      // AI 답변 완료 → 잠깐 쉬고 자동으로 다시 듣기 시작 (티카타카 핵심)
      setUI('listening');
      setTimeout(() => {
        if (isChatMode) startRecording();
      }, AUTO_LISTEN_MS);
    } else {
      setUI('connected');
    }
    return;
  }

  isPlaying = true;
  setUI('playing');

  const b64   = audioQueue.shift();
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const blob  = new Blob([bytes], { type: 'audio/mp3' });
  const url   = URL.createObjectURL(blob);

  currentAudio = new Audio(url);
  currentAudio.onended = () => { URL.revokeObjectURL(url); playNext(); };
  currentAudio.onerror = () => { URL.revokeObjectURL(url); playNext(); };
  currentAudio.play().catch(() => playNext());

  // 재생 시작하면 인터럽트 VAD 활성화
  startInterruptVAD();
}

function stopPlayback() {
  audioQueue = [];
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  isPlaying = false;
  stopInterruptVAD();
}

// ═══════════════════════════════════════════════════════════════════
// 인터럽트 VAD — 재생 중 사용자가 말하면 AI 발화 중단
// ═══════════════════════════════════════════════════════════════════
function startInterruptVAD() {
  if (!analyser || vadTimer) return;
  const data = new Uint8Array(analyser.fftSize);

  vadTimer = setInterval(() => {
    if (!isPlaying) { stopInterruptVAD(); return; }
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    levelFill.style.width = Math.min(rms * 500, 100) + '%';

    if (rms > INTERRUPT_RMS) {
      triggerInterrupt();
    }
  }, 80);
}

function stopInterruptVAD() {
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  levelFill.style.width = '0%';
}

function triggerInterrupt() {
  if (!isPlaying) return;
  stopPlayback();
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }

  if (isChatMode) {
    // 인터럽트 후 즉시 다시 녹음 시작 (사용자가 말하고 싶은 것)
    setTimeout(() => { if (isChatMode) startRecording(); }, 100);
  } else {
    setUI('connected');
  }
}

// ═══════════════════════════════════════════════════════════════════
// 침묵 감지 VAD — 녹음 중 말이 끝나면 자동 전송
// ═══════════════════════════════════════════════════════════════════
function startSilenceVAD() {
  if (!analyser) return;
  speechStart  = null;
  let hasSpeech = false;
  const data    = new Uint8Array(analyser.fftSize);

  function tick() {
    if (!isRecording) {
      levelFill.style.width = '0%';
      return;
    }
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    levelFill.style.width = Math.min(rms * 400, 100) + '%';

    if (rms > SPEECH_RMS) {
      // 말하고 있음
      if (!hasSpeech) {
        hasSpeech  = true;
        speechStart = Date.now();
      }
      // 침묵 타이머 초기화
      if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
        silenceFill.style.transition = 'none';
        silenceFill.style.width = '0%';
      }
    } else if (hasSpeech && !silenceTimer) {
      // 말하다 멈춤 → 침묵 타이머 시작
      // 최소 발화 길이 확인
      const spokenMs = speechStart ? Date.now() - speechStart : 0;
      if (spokenMs < MIN_SPEECH_MS) {
        // 너무 짧으면 무시
      } else {
        // 침묵 진행 바 애니메이션
        silenceFill.style.transition = `width ${SILENCE_MS}ms linear`;
        silenceFill.style.width = '100%';
        silenceTimer = setTimeout(() => {
          silenceTimer = null;
          if (isRecording && isChatMode) stopRecording(); // 자동 전송
        }, SILENCE_MS);
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════════════
// 마이크 초기화
// ═══════════════════════════════════════════════════════════════════
async function initMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    return true;
  } catch (e) {
    addBubble('error', '마이크 접근 권한이 필요합니다: ' + e.message);
    return false;
  }
}

// ═══════════════════════════════════════════════════════════════════
// 녹음 시작 / 종료 / 전송
// ═══════════════════════════════════════════════════════════════════
function startRecording() {
  if (!micStream || isRecording || isProcessing) return;
  if (isPlaying) triggerInterrupt();

  audioChunks  = [];
  mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = sendAudio;
  mediaRecorder.start(100);

  isRecording = true;
  setUI('recording');
  startSilenceVAD();
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  mediaRecorder.stop();
  isRecording  = false;
  isProcessing = true;
  setUI('processing');
}

async function sendAudio() {
  if (audioChunks.length === 0) {
    isProcessing = false;
    if (isChatMode) { setUI('listening'); setTimeout(() => isChatMode && startRecording(), 300); }
    else setUI('connected');
    return;
  }
  const blob   = new Blob(audioChunks, { type: 'audio/webm' });
  const buffer = await blob.arrayBuffer();
  const b64    = btoa(String.fromCharCode(...new Uint8Array(buffer)));

  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type:    'audio',
      data:    b64,
      speaker: speakerSel.value,
      context: {},
    }));
  }
}

// ═══════════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════════
let assistantBubble = null;  // 현재 AI 응답 버블 (누적 표시용)

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => setUI('connected');

  ws.onclose = () => {
    setUI('disconnected');
    isChatMode = false;
    talkBtn.classList.remove('active');
    talkBtn.textContent = '🎙️';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    if (msg.type === 'transcript') {
      addBubble('user', msg.text);
      assistantBubble = addBubble('assistant', '...');
    }
    else if (msg.type === 'audio_chunk') {
      enqueueAudio(msg.data);
    }
    else if (msg.type === 'ai_text') {
      // 서버가 누적 텍스트를 보내면 버블 업데이트 (선택적)
      if (assistantBubble) assistantBubble.textContent = msg.text;
    }
    else if (msg.type === 'done') {
      isProcessing = false;
      // playNext()가 큐를 다 소진하면 자동으로 다시 듣기 시작
    }
    else if (msg.type === 'interrupted') {
      isProcessing = false;
      // triggerInterrupt()에서 이미 처리됨
    }
    else if (msg.type === 'error') {
      isProcessing = false;
      addBubble('error', '오류: ' + msg.message);
      if (isChatMode) {
        setUI('listening');
        setTimeout(() => isChatMode && startRecording(), 500);
      } else {
        setUI('connected');
      }
    }
  };
}

// ═══════════════════════════════════════════════════════════════════
// 대화 모드 토글 (대화 시작 / 종료)
// ═══════════════════════════════════════════════════════════════════
talkBtn.addEventListener('click', async () => {
  if (!isChatMode) {
    // ── 대화 시작 ──
    if (!micStream) {
      const ok = await initMic();
      if (!ok) return;
    }
    isChatMode = true;
    talkBtn.classList.add('active');
    talkBtn.textContent = '⏹️';
    startRecording();
  } else {
    // ── 대화 종료 ──
    isChatMode = false;
    talkBtn.classList.remove('active');
    talkBtn.textContent = '🎙️';

    if (isRecording) stopRecording();
    if (isPlaying)   stopPlayback();
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    isProcessing = false;
    setUI('connected');
  }
});

// ═══════════════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════════════
connectWS();
</script>
</body>
</html>

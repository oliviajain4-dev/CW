version: "3.9"

services:

  # ── PostgreSQL DB ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: codi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-codi}
      POSTGRES_USER:     ${POSTGRES_USER:-codi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codi_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data      # 데이터 영속화
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql  # 최초 1회 스키마 자동 실행
    ports:
      - "5432:5432"   # 로컬에서 DB 직접 접근 가능 (DBeaver 등)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codi_user} -d ${POSTGRES_DB:-codi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Flask 웹 앱 ───────────────────────────────────────────────────
  web:
    build: .
    container_name: codi_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # DB 연결 (db 서비스 이름이 호스트명)
      DATABASE_URL: postgresql://${POSTGRES_USER:-codi_user}:${POSTGRES_PASSWORD:-codi_pass}@db:5432/${POSTGRES_DB:-codi}
      # API 키
      KMA_API_KEY:    ${KMA_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      # Flask 설정
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
    volumes:
      - .:/app                                        # 소스코드 마운트 (코드 변경 즉시 반영)
      - uploaded_images:/app/static/uploads           # 업로드 이미지 영속화
      - huggingface_cache:/root/.cache/huggingface    # AI 모델 캐시 (재시작해도 재다운로드 없음)
    depends_on:
      db:
        condition: service_healthy    # DB 준비 완료 후 Flask 기동
    command: python app.py

  # ── FastAPI 음성 파이프라인 서버 ───────────────────────────────────
  voice:
    build: .
    container_name: codi_voice
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CLAUDE_API_KEY:      ${CLAUDE_API_KEY}
      CLOVA_CLIENT_ID:     ${CLOVA_CLIENT_ID}
      CLOVA_CLIENT_SECRET: ${CLOVA_CLIENT_SECRET}
    volumes:
      - .:/app                                        # 소스코드 마운트
      - whisper_cache:/root/.cache/whisper            # Whisper small 모델 (~460MB, 최초 1회만 다운로드)
    command: python voice_api.py

volumes:
  postgres_data:        # DB 데이터 (컨테이너 삭제해도 유지)
  uploaded_images:      # 업로드 이미지 (컨테이너 삭제해도 유지)
  huggingface_cache:    # AI 모델 캐시 (FashionSigLIP ~600MB, 최초 1회만 다운로드)
  whisper_cache:        # Whisper 모델 캐시 (~460MB, 최초 1회만 다운로드)

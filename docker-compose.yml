version: "3.9"

services:

  # ── PostgreSQL DB ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: codi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-codi}
      POSTGRES_USER:     ${POSTGRES_USER:-codi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codi_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codi_user} -d ${POSTGRES_DB:-codi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI 통합 서버 (Flask 대체 + 음성 파이프라인 포함) ──────────
  web:
    build: .
    container_name: codi_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      KMA_API_KEY:         ${KMA_API_KEY}
      CLAUDE_API_KEY:      ${CLAUDE_API_KEY}
      FLASK_SECRET_KEY:    ${FLASK_SECRET_KEY:-change-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - .:/app
      - uploaded_images:/app/static/uploads
      - huggingface_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/whisper
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 5000

volumes:
  postgres_data:
  uploaded_images:
  huggingface_cache:    # FashionSigLIP ~600MB
  whisper_cache:
